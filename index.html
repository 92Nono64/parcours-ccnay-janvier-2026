function chargerMois(m) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+m)?.classList.add('active');
    const container = document.getElementById('liste-parcours');
    container.innerHTML = "";
    
    if (!programmeAnnuel[m] || programmeAnnuel[m].length === 0) {
        container.innerHTML = "<div class='empty-msg'>Le programme de ce mois n'est pas encore disponible.</div>";
        return;
    }

    programmeAnnuel[m].forEach(item => {
        let mapSectionHtml = "";
        if (item.isOpenRunner) {
            mapSectionHtml = `
                <div class="map-section">
                    <div style="font-size:0.8rem; color:#666; margin-bottom:10px; font-style:italic;">Cartes hébergées sur OpenRunner :</div>
                    <a href="${item.t1.lienGPX}" target="_blank" class="btn-map-large" style="margin-bottom:8px; font-size:0.85rem;">🗺️ CARTE T1 (109km)</a>
                    <a href="${item.t2.lienGPX}" target="_blank" class="btn-map-large" style="margin-bottom:8px; font-size:0.85rem;">🗺️ CARTE T2 (76km)</a>
                    <a href="${item.t3.lienGPX}" target="_blank" class="btn-map-large" style="font-size:0.85rem;">🗺️ CARTE T3 (44km)</a>
                </div>`;
        } else {
            mapSectionHtml = `
                <div class="map-section">
                    <button class="btn-map-large" onclick="openMap('https://www.visugpx.com/${item.idCarteVisu}?iframe&maponly')">🗺️ VOIR LA CARTE</button>
                </div>`;
        }

        container.innerHTML += `
        <div class="borne-card">
            <div class="borne-header">${item.weekend}</div>
            <div class="horaires-bandeau">${item.horaires}</div>
            ${mapSectionHtml}
            ${genererTrace(item.t1, 't1')}
            ${genererTrace(item.t2, 't2')}
            ${genererTrace(item.t3, 't3')}
        </div>`;
    });
}

function genererTrace(t, tag) {
    if(!t) return "";
    const textBtn = t.btnText ? t.btnText : `📥 GPX ${tag.toUpperCase()}`;
    return `<div class="circuit-row">
        <div><span class="tag tag-${tag}">${tag.toUpperCase()}</span> <b>${t.km}</b> | <span style="color:#d35400">${t.dplus}</span></div>
        <div class="nom-parcours">${t.nom}</div>
        <div class="lieux">📍 ${t.lieux}</div>
        <a href="${t.lienGPX}" class="btn-gpx btn-gpx-${tag}" target="_blank">${textBtn}</a>
    </div>`;
}

function openMap(s) { 
    document.getElementById('map-modal').style.display="flex"; 
    document.getElementById('modal-frame').src=s; 
}
function closeMap() { 
    document.getElementById('map-modal').style.display="none"; 
    document.getElementById('modal-frame').src=""; 
}

    .then(d => {
        const w = d.current_weather;
        document.getElementById('w-text').innerHTML = `Nay : ${Math.round(w.temperature)}°C • Vent: ${Math.round(w.windspeed)} km/h`;
    })
    .catch(() => { document.getElementById('w-text').textContent = "Météo indisponible"; });
